<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forensic AI System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fbf3f3;
overflow-x:hidden;
}


/* NAVBAR */

.navbar{
background:linear-gradient(90deg,#b30000,#d10000);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.logo{
background:#1f3a3d;
padding:18px 35px;
border-radius:0 0 40px 40px;
color:white;
font-weight:600;
font-size:18px;
}

.nav-links{
display:flex;
gap:18px;
}

.nav-links a{
background:#ffffff;
padding:12px 28px;
border-radius:12px;
font-size:15px;
font-weight:600;
letter-spacing:1px;
color:#333;
border:1px solid #e9dede;
text-decoration:none;
transition:0.35s;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.nav-links a:hover{
color:#b30000;
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.nav-links a.active{
background:#b30000;
color:white;
}


/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:90px;
min-height:85vh;
position:relative;
}


/* TEXT */

.hero-text{
width:50%;
z-index:2;
}

.hero-text h1{
font-size:75px;
font-weight:800;
background:linear-gradient(45deg,#0b1a2b,#b30000);
-webkit-background-clip:text;
color:transparent;
}

.hero-text span{
display:block;
margin-top:15px;
font-size:22px;
letter-spacing:6px;
color:#b30000;
}

.hero-text p{
margin-top:25px;
font-size:17px;
line-height:1.7;
color:#444;
max-width:520px;
}


/* LOGIN CONTAINER */

.login-container{

width:420px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

z-index:2;

}

.login-container h2{

text-align:center;

margin-bottom:25px;

color:#b30000;

}

.input-group{

margin-bottom:20px;

}

.input-group input{

width:100%;

padding:14px;

border-radius:8px;

border:1px solid #ddd;

font-size:15px;

outline:none;

}

.input-group input:focus{

border-color:#b30000;

}

.login-btn{

width:100%;

padding:14px;

background:linear-gradient(45deg,#b30000,#ff3030);

border:none;

border-radius:30px;

color:white;

font-weight:600;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(0,0,0,0.25);

}


/* DNA NETWORK */

.network{
position:absolute;
left:-320px;
top:-20px;
width:900px;
height:700px;
z-index:1;
pointer-events:none;
}

.network line{
stroke:#c9ced4;
stroke-width:2;
}

.network circle{
fill:#b30000;
}

</style>

</head>

<body>


<div class="navbar">

<div class="logo">🕵️ Forensic AI</div>

<div class="nav-links">

<a href="/">HOME</a>
<a href="/admin_login">Admin</a>
<a href="/police_login" class="active">Police</a>

</div>

</div>


<section class="hero">


<div class="hero-text">

<h1>POLICE PORTAL</h1>

<span>FORENSIC AI INVESTIGATION</span>

<p>
Access the forensic AI system to perform suspect searches,
analyze eyewitness descriptions, and identify possible
criminal matches using advanced facial recognition technology.
</p>

</div>


<!-- POLICE LOGIN -->

<div class="login-container">

<h2>Police Login</h2>

<form method="POST" action="/police_login">

<div class="input-group">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-group">
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit" class="login-btn">Login</button>

</form>

</div>


<!-- DNA NETWORK -->

<svg class="network">

<line x1="50" y1="120" x2="180" y2="80"/>
<line x1="180" y1="80" x2="260" y2="160"/>
<line x1="260" y1="160" x2="120" y2="220"/>
<line x1="120" y1="220" x2="300" y2="280"/>
<line x1="300" y1="280" x2="200" y2="350"/>
<line x1="200" y1="350" x2="350" y2="420"/>
<line x1="350" y1="420" x2="150" y2="450"/>
<line x1="150" y1="450" x2="260" y2="520"/>

<circle cx="50" cy="120" r="6"/>
<circle cx="180" cy="80" r="6"/>
<circle cx="260" cy="160" r="6"/>
<circle cx="120" cy="220" r="6"/>
<circle cx="300" cy="280" r="6"/>
<circle cx="200" cy="350" r="6"/>
<circle cx="350" cy="420" r="6"/>
<circle cx="150" cy="450" r="6"/>

</svg>

</section>

</body>
</html>
